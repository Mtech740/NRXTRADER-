<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NRXTRADER</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://s3.tradingview.com/tv.js"></script>

    <style>
        :root {
            --bg:#0B0F1A;
            --surface:#111827;
            --border:#1f2937;
            --text:#f1f5f9;
            --muted:#94a3b8;
            --accent:#6C5CE7;
            --green:#00C853;
            --red:#FF3D00;
            --warning:#f59e0b;
            --radius:14px;
        }

        * {
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body {
            font-family:'Inter',sans-serif;
            background:var(--bg);
            color:var(--text);
            overflow-x:hidden;
        }

        .container {
            display:flex;
            min-height:100vh;
        }

        .sidebar {
            width:230px;
            background:var(--surface);
            border-right:1px solid var(--border);
            padding:20px;
        }

        .logo {
            font-size:26px;
            font-weight:700;
            color:var(--accent);
            margin-bottom:20px;
        }

        .logo span {
            color:#fff;
        }

        .sidebar ul {
            list-style:none;
        }

        .sidebar li {
            padding:12px;
            margin-bottom:8px;
            border-radius:10px;
            cursor:pointer;
            transition:0.2s;
            color:var(--muted);
        }

        .sidebar li:hover,
        .sidebar li.active {
            background:var(--accent);
            color:white;
        }

        .main {
            flex:1;
            padding:20px;
        }

        .topbar {
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
        }

        .cards {
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
            gap:14px;
            margin-bottom:18px;
        }

        .card {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius);
            padding:16px;
        }

        .card h3 {
            font-size:13px;
            color:var(--muted);
            margin-bottom:10px;
        }

        .card p {
            font-size:24px;
            font-weight:700;
        }

        .green {
            color:var(--green);
        }

        .red {
            color:var(--red);
        }

        .chart-row {
            display:grid;
            grid-template-columns:2fr 1fr;
            gap:16px;
        }

        .chart-box,
        .trade-box,
        .panel {
            background:var(--surface);
            border:1px solid var(--border);
            border-radius:var(--radius);
            padding:16px;
        }

        #chartContainer {
            height:500px;
        }

        .trade-box input,
        .trade-box select {
            width:100%;
            margin-top:8px;
            margin-bottom:12px;
            padding:12px;
            border-radius:10px;
            border:1px solid var(--border);
            background:var(--bg);
            color:white;
        }

        .btn {
            border:none;
            border-radius:10px;
            padding:12px;
            cursor:pointer;
            font-weight:600;
        }

        .btn-buy {
            background:var(--green);
            color:white;
            width:100%;
            margin-bottom:10px;
        }

        .btn-sell {
            background:var(--red);
            color:white;
            width:100%;
        }

        .syna-status {
            margin-top:14px;
            padding:12px;
            border-radius:10px;
            background:#0f172a;
        }

        .recent-list {
            margin-top:10px;
        }

        .trade-item {
            display:flex;
            justify-content:space-between;
            padding:10px 0;
            border-bottom:1px solid var(--border);
            font-size:13px;
        }

        .login-overlay {
            position:fixed;
            inset:0;
            background:rgba(0,0,0,0.9);
            display:flex;
            align-items:center;
            justify-content:center;
            z-index:999;
        }

        .login-box {
            width:90%;
            max-width:420px;
            background:var(--surface);
            border-radius:20px;
            padding:30px;
            border:1px solid var(--border);
        }

        .login-box input {
            width:100%;
            padding:14px;
            margin-top:12px;
            background:var(--bg);
            border:1px solid var(--border);
            border-radius:10px;
            color:white;
        }

        .login-btn {
            width:100%;
            margin-top:16px;
            background:var(--accent);
            color:white;
        }

        @media(max-width:900px){
            .chart-row {
                grid-template-columns:1fr;
            }
        }

        @media(max-width:700px){
            .container {
                flex-direction:column;
            }

            .sidebar {
                width:100%;
                border-right:none;
                border-bottom:1px solid var(--border);
            }
        }
    </style>
</head>
<body>

<div id="loginOverlay" class="login-overlay">
    <div class="login-box">
        <h2 style="margin-bottom:10px;color:#6C5CE7;">NRXTRADER</h2>

        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">

        <button class="btn login-btn" onclick="handleLogin()">LOGIN</button>

        <p id="loginError" style="margin-top:10px;color:red;font-size:13px;"></p>
    </div>
</div>

<div class="container" id="dashboard" style="display:none;">

    <div class="sidebar">
        <div class="logo">NRX<span>TRADER</span></div>

        <ul>
            <li class="active">Dashboard</li>
            <li onclick="toggleSyna()">S.Y.N.A</li>
            <li onclick="logout()">Logout</li>
        </ul>
    </div>

    <div class="main">

        <div class="topbar">
            <h1>Professional Trading</h1>
            <div id="serverStatus">Checking server...</div>
        </div>

        <div class="cards">
            <div class="card">
                <h3>Balance</h3>
                <p id="balValue">ZMW 0.00</p>
            </div>

            <div class="card">
                <h3>Total Profit</h3>
                <p class="green" id="profitValue">+0.00</p>
            </div>

            <div class="card">
                <h3>Trades</h3>
                <p id="tradeCount">0</p>
            </div>
        </div>

        <div class="chart-row">

            <div class="chart-box">

                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                    <h2 id="selectedMarket">BTC/USDT</h2>

                    <select id="marketSelector" onchange="changeMarket()">
                        <option value="BTC/USDT">BTC/USDT</option>
                        <option value="ETH/USDT">ETH/USDT</option>
                        <option value="XRP/USDT">XRP/USDT</option>
                        <option value="EUR/USD">EUR/USD</option>
                        <option value="GBP/USD">GBP/USD</option>
                        <option value="XAU/USD">XAU/USD</option>
                    </select>
                </div>

                <div id="chartContainer"></div>
            </div>

            <div class="trade-box">

                <h2>Manual Trade</h2>

                <input type="number" id="tradeAmount" placeholder="Trade amount">

                <button class="btn btn-buy" onclick="executeTrade('BUY')">BUY</button>
                <button class="btn btn-sell" onclick="executeTrade('SELL')">SELL</button>

                <div class="syna-status">
                    <h3>S.Y.N.A STATUS</h3>

                    <p style="margin-top:8px;">Price: <span id="synaPrice">--</span></p>
                    <p>Trend: <span id="synaTrend">--</span></p>
                    <p>Confidence: <span id="synaConf">0</span>%</p>

                    <button class="btn login-btn" style="margin-top:12px;" id="synaBtn" onclick="toggleSyna()">
                        START SYNA
                    </button>
                </div>
            </div>
        </div>

        <div class="panel" style="margin-top:16px;">
            <h2>Recent Trades</h2>

            <div id="recentTrades" class="recent-list">
                <p>No trades yet</p>
            </div>
        </div>

    </div>
</div>

<script>

const API = 'https://nrxtrader-api.onrender.com';

let token = localStorage.getItem('token') || null;
let user = JSON.parse(localStorage.getItem('user') || 'null');

let balance = 0;
let totalTrades = 0;
let totalProfit = 0;

let selectedMarketPair = 'BTC/USDT';

let synaActive = false;
let synaInterval = null;
let priceHistory = [];

const MA_PERIOD = 6;

const symbolMap = {
    'BTC/USDT':'BINANCE:BTCUSDT',
    'ETH/USDT':'BINANCE:ETHUSDT',
    'XRP/USDT':'BINANCE:XRPUSDT',
    'EUR/USD':'FX:EURUSD',
    'GBP/USD':'FX:GBPUSD',
    'XAU/USD':'OANDA:XAUUSD'
};

let tvWidget;

function loadChart(symbol){

    if(tvWidget){
        tvWidget.remove();
    }

    tvWidget = new TradingView.widget({
        autosize:true,
        symbol:symbolMap[symbol],
        interval:'15',
        timezone:'Etc/UTC',
        theme:'dark',
        style:'1',
        locale:'en',
        container_id:'chartContainer',
        enable_publishing:false,
        allow_symbol_change:false
    });
}

async function apiCall(method,path,body=null){

    const headers = {
        'Content-Type':'application/json'
    };

    if(token){
        headers['Authorization'] = `Bearer ${token}`;
    }

    const response = await fetch(API + path, {
        method,
        headers,
        body: body ? JSON.stringify(body) : null
    });

    const data = await response.json();

    if(!response.ok){
        throw new Error(data.error || 'Request failed');
    }

    return data;
}

async function checkServer(){

    try {
        const response = await fetch(API, {
            method:'GET'
        });

        if(response.ok){
            document.getElementById('serverStatus').innerHTML = '<span style="color:#00C853">ONLINE</span>';
        } else {
            document.getElementById('serverStatus').innerHTML = '<span style="color:#FF3D00">OFFLINE</span>';
        }

    } catch(err){
        document.getElementById('serverStatus').innerHTML = '<span style="color:#FF3D00">SERVER SLEEPING</span>';
    }
}

async function fetchPrice(symbol){

    try {

        const response = await fetch(`${API}/api/price?symbol=${encodeURIComponent(symbol)}`);

        const data = await response.json();

        return data.price;

    } catch(err){
        console.log(err);
        return null;
    }
}

async function updateSyna(){

    const price = await fetchPrice(selectedMarketPair);

    if(price === null){
        document.getElementById('synaPrice').textContent = 'N/A';
        return null;
    }

    document.getElementById('synaPrice').textContent = price;

    priceHistory.push(price);

    if(priceHistory.length > MA_PERIOD){
        priceHistory.shift();
    }

    if(priceHistory.length < MA_PERIOD){
        return null;
    }

    const ma = priceHistory.reduce((a,b)=>a+b,0) / priceHistory.length;

    const diff = ((price - ma) / ma) * 100;

    let signal = 'HOLD';
    let confidence = 50;

    if(diff > 0.1){
        signal = 'BUY';
        confidence = Math.min(95, Math.floor(Math.abs(diff)*50));
    }

    if(diff < -0.1){
        signal = 'SELL';
        confidence = Math.min(95, Math.floor(Math.abs(diff)*50));
    }

    document.getElementById('synaTrend').textContent = signal;
    document.getElementById('synaConf').textContent = confidence;

    return signal;
}

async function synaTick(){

    if(!synaActive){
        return;
    }

    const signal = await updateSyna();

    if(!signal || signal === 'HOLD'){
        return;
    }

    addTrade(`SYNA ${signal}`);
}

function toggleSyna(){

    synaActive = !synaActive;

    const btn = document.getElementById('synaBtn');

    if(synaActive){

        btn.innerText = 'STOP SYNA';
        btn.style.background = '#FF3D00';

        synaTick();

        synaInterval = setInterval(synaTick, 10000);

    } else {

        btn.innerText = 'START SYNA';
        btn.style.background = '#6C5CE7';

        clearInterval(synaInterval);
    }
}

function addTrade(text){

    totalTrades++;

    document.getElementById('tradeCount').textContent = totalTrades;

    const div = document.createElement('div');

    div.className = 'trade-item';

    div.innerHTML = `
        <span>${text}</span>
        <span class="green">ACTIVE</span>
    `;

    const recent = document.getElementById('recentTrades');

    if(recent.innerHTML.includes('No trades yet')){
        recent.innerHTML = '';
    }

    recent.prepend(div);
}

async function executeTrade(direction){

    const amount = parseFloat(document.getElementById('tradeAmount').value);

    if(!amount || amount < 200){
        alert('Minimum amount is K200');
        return;
    }

    if(balance < amount){
        alert('Insufficient balance');
        return;
    }

    try {

        const data = await apiCall('POST','/api/trades/manual',{
            symbol:selectedMarketPair.replace('/',''),
            direction,
            amount
        });

        balance = data.new_balance || balance;

        totalProfit += data.pnl || 0;

        refreshUI();

        addTrade(`${direction} ${selectedMarketPair} K${amount}`);

        alert(`${direction} trade successful`);

    } catch(err){
        alert(err.message);
    }
}

function refreshUI(){

    document.getElementById('balValue').textContent = 'ZMW ' + balance.toFixed(2);

    document.getElementById('profitValue').textContent = totalProfit >= 0
        ? '+' + totalProfit.toFixed(2)
        : totalProfit.toFixed(2);
}

function changeMarket(){

    selectedMarketPair = document.getElementById('marketSelector').value;

    document.getElementById('selectedMarket').textContent = selectedMarketPair;

    priceHistory = [];

    loadChart(selectedMarketPair);
}

async function handleLogin(){

    const email = document.getElementById('loginEmail').value;
    const password = document.getElementById('loginPassword').value;

    try {

        const data = await apiCall('POST','/api/auth/login',{
            email,
            password
        });

        token = data.token;
        user = data.user;

        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(user));

        balance = parseFloat(user.balance || 0);

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';

        refreshUI();
        loadChart(selectedMarketPair);
        checkServer();

    } catch(err){
        document.getElementById('loginError').innerText = err.message;
    }
}

function logout(){

    localStorage.clear();

    token = null;
    user = null;

    location.reload();
}

window.onload = () => {

    if(token && user){

        balance = parseFloat(user.balance || 0);

        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('dashboard').style.display = 'flex';

        refreshUI();
        loadChart(selectedMarketPair);
        checkServer();
    }
};

</script>

</body>
</html>
