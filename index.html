<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>API Test</title>
    <style>
        body { font-family: sans-serif; background: #111; color: #fff; padding: 20px; }
        button { padding: 12px 24px; margin: 10px 5px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; }
        pre { background: #1e293b; padding: 15px; border-radius: 8px; overflow-x: auto; white-space: pre-wrap; }
        .error { color: #f87171; }
    </style>
</head>
<body>
    <h2>NRXTRADER API Test</h2>
    <p>Base URL: <code>https://nrxtrader-api.onrender.com</code></p>
    <div>
        <button onclick="testRegister()">Test Register</button>
        <button onclick="testLogin()">Test Login</button>
        <button onclick="testBalance()">Test Balance (needs token)</button>
    </div>
    <h3>Response:</h3>
    <pre id="output">Waiting...</pre>

    <script>
        const API = 'https://nrxtrader-api.onrender.com';
        let token = null;

        function display(obj) {
            document.getElementById('output').textContent = JSON.stringify(obj, null, 2);
        }

        async function testRegister() {
            display('Sending register request...');
            try {
                const res = await fetch(API + '/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'apitest@nrxtrader.com',
                        phone: '',
                        password: 'test1234'
                    })
                });
                const data = await res.json();
                display({ status: res.status, data });
                if (data.success) {
                    token = null; // not returned from register directly
                }
            } catch (e) {
                display({ error: e.message });
            }
        }

        async function testLogin() {
            display('Sending login request...');
            try {
                const res = await fetch(API + '/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: 'apitest@nrxtrader.com',
                        password: 'test1234'
                    })
                });
                const data = await res.json();
                if (data.token) {
                    token = data.token;
                    document.getElementById('output').textContent = 'Login success! Token: ' + data.token.slice(0, 20) + '...\nFull response: ' + JSON.stringify(data, null, 2);
                } else {
                    display({ status: res.status, data });
                }
            } catch (e) {
                display({ error: e.message });
            }
        }

        async function testBalance() {
            if (!token) {
                display({ error: 'No token. Please login first.' });
                return;
            }
            display('Fetching balance...');
            try {
                const res = await fetch(API + '/api/wallet/balance', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await res.json();
                display({ status: res.status, data });
            } catch (e) {
                display({ error: e.message });
            }
        }
    </script>
</body>
</html>
