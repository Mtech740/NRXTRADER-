<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
const API = 'https://nrxtrader-api.onrender.com';
let token = localStorage.getItem('nrxtrader_token') || null;
let user = JSON.parse(localStorage.getItem('nrxtrader_user') || 'null');
let balance = 0;
let premium = false;
let trial = false;
let tradeDirection = 'buy';
let totalTrades = 0;
let totalProfitAccum = 0;
let selectedMarketPair = 'BTC/USDT';

let synaActive = false;
let synaTimer = null;
let synaWins = 0, synaLosses = 0;
const SYNA_AMOUNT = 100;
let priceHistory = [];
const MA_PERIOD = 8;

let serverAwake = false;

const binanceSymbolMap = {
    'BTC/USDT': 'BTCUSDT',
    'ETH/USDT': 'ETHUSDT',
    'XRP/USDT': 'XRPUSDT'
};
const forexApiMap = {
    'EUR/USD': 'EUR',
    'GBP/USD': 'GBP',
    'XAU/USD': 'XAU'
};

// (DOM references unchanged)

const symbolMap = {
    'BTC/USDT': 'BINANCE:BTCUSDT',
    'ETH/USDT': 'BINANCE:ETHUSDT',
    'XRP/USDT': 'BINANCE:XRPUSDT',
    'EUR/USD': 'FX:EURUSD',
    'GBP/USD': 'FX:GBPUSD',
    'XAU/USD': 'OANDA:XAUUSD'
};

let tvWidget = null;

function loadChart(symbol) {
    if (tvWidget) tvWidget.remove();
    if (!symbolMap[symbol]) return;
    tvWidget = new TradingView.widget({
        "container_id": "chartContainer",
        "autosize": true,
        "symbol": symbolMap[symbol],
        "interval": "D",
        "timezone": "Etc/UTC",
        "theme": "dark",
        "style": "1",
        "locale": "en",
        "toolbar_bg": "#f1f3f6",
        "enable_publishing": false,
        "allow_symbol_change": false,
        "save_image": false,
        "hide_side_toolbar": false,
        "details": false,
        "hotlist": false,
        "calendar": false,
        "studies": []
    });
}

// ==================== RELIABLE API CALL (60s timeout) ====================
async function apiCall(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 60000); // 60 seconds
    try {
        const res = await fetch(API + path, {
            method,
            headers,
            body: body ? JSON.stringify(body) : null,
            signal: controller.signal
        });
        clearTimeout(timeout);
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || 'Request failed');
        }
        return await res.json();
    } catch (err) {
        clearTimeout(timeout);
        throw err;
    }
}

// ==================== SERVER CHECK ====================
async function isServerAwake() {
    try {
        await fetch(API, { method: 'HEAD', cache: 'no-store' });
        return true;
    } catch (e) {
        return false;
    }
}

async function checkServer() {
    const awake = await isServerAwake();
    serverAwake = awake;
    if (awake) {
        serverStatus.textContent = 'Server online';
        serverStatus.className = 'server-status status-ok';
        synaServerMsg.style.display = 'none';
    } else {
        serverStatus.textContent = 'Server asleep – tap Wake Server';
        serverStatus.className = 'server-status status-sleep';
    }
    return awake;
}

// ==================== WAKE UP + WARM UP ====================
async function wakeServerNow() {
    serverStatus.textContent = 'Waking server...';
    serverStatus.className = 'server-status status-sleep';
    let awake = false;
    for (let i = 1; i <= 80; i++) {
        if (await isServerAwake()) {
            awake = true;
            break;
        }
        serverStatus.textContent = `Waking... ${i * 3}s`;
        await new Promise(r => setTimeout(r, 3000));
    }
    if (!awake) {
        serverStatus.textContent = 'Server did not wake – open wake.html or try later';
        serverStatus.className = 'server-status status-sleep';
        return false;
    }
    // Now warm the database by hitting an authenticated endpoint
    try {
        await apiCall('GET', '/api/wallet/balance');
        // Success – DB is warm
    } catch (e) {
        // Ignore errors (e.g., token missing), we just needed to trigger DB connection
    }
    serverAwake = true;
    serverStatus.textContent = 'Server online';
    serverStatus.className = 'server-status status-ok';
    synaServerMsg.style.display = 'none';
    return true;
}

// ==================== PRICE FETCHING ====================
async function fetchLivePrice(symbol) {
    if (binanceSymbolMap[symbol]) {
        const binSymbol = binanceSymbolMap[symbol];
        try {
            const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${binSymbol}`);
            const data = await res.json();
            return parseFloat(data.price);
        } catch (e) { return null; }
    }
    if (forexApiMap[symbol]) {
        const targetCurrency = forexApiMap[symbol];
        try {
            const res = await fetch(`https://api.exchangerate.host/convert?from=${targetCurrency}&to=USD&amount=1`);
            const data = await res.json();
            if (data.result !== null) return parseFloat(data.result);
            return null;
        } catch (e) { return null; }
    }
    return null;
}

async function updateSynaSignal() {
    const symbol = selectedMarketPair;
    synaForexNote.style.display = 'none';
    const price = await fetchLivePrice(symbol);
    if (price === null) {
        synaPrice.textContent = 'N/A';
        synaTrend.textContent = 'TREND: --';
        synaTrend.className = '';
        synaConf.textContent = '--';
        if (!binanceSymbolMap[symbol] && !forexApiMap[symbol]) {
            synaForexNote.style.display = 'block';
            synaForexNote.textContent = 'This market is not supported.';
        }
        return { direction: null, confidence: 0 };
    }
    synaPrice.textContent = 'K' + price.toLocaleString(undefined, {maximumFractionDigits:2});
    priceHistory.push(price);
    if (priceHistory.length > MA_PERIOD) priceHistory.shift();
    let signal = 'HOLD';
    let trendText = 'SIDEWAYS';
    let trendClass = '';
    let confidence = 50;
    if (priceHistory.length >= 2) {
        const sum = priceHistory.reduce((a, b) => a + b, 0);
        const ma = sum / priceHistory.length;
        const diff = price - ma;
        const percentDiff = (diff / ma) * 100;
        if (diff > 0) {
            signal = 'BUY';
            trendText = 'BULLISH';
            trendClass = 'green';
        } else if (diff < 0) {
            signal = 'SELL';
            trendText = 'BEARISH';
            trendClass = 'red-text';
        }
        confidence = Math.min(95, Math.max(50, Math.floor(Math.abs(percentDiff) * 30 + 50)));
    }
    synaTrend.textContent = 'TREND: ' + trendText;
    synaTrend.className = trendClass;
    synaConf.textContent = confidence;
    return { direction: signal, confidence };
}

// ==================== SYNA TRADE WITH WARM-UP ====================
async function synaTick() {
    if (!synaActive) return;
    if (balance < SYNA_AMOUNT) {
        stopSyna();
        alert('SYNA stopped: insufficient balance.');
        return;
    }
    if (!serverAwake) {
        synaServerMsg.style.display = 'block';
        const woke = await wakeServerNow();
        if (!woke) return;
    } else {
        // Even if server is marked awake, warm DB before first trade of the session
        try { await apiCall('GET', '/api/wallet/balance'); } catch (e) {}
    }
    synaServerMsg.style.display = 'none';
    const signalData = await updateSynaSignal();
    if (!signalData.direction || signalData.direction === 'HOLD') return;

    const direction = signalData.direction;
    const symbol = selectedMarketPair.replace('/', '').replace(' ', '');
    const isForex = !!forexApiMap[selectedMarketPair];
    const movePercent = isForex ? 0.005 : 0.03;
    try {
        const data = await apiCall('POST', '/api/trades/manual', {
            symbol: symbol,
            direction: direction,
            amount: SYNA_AMOUNT
        });
        balance = data.new_balance;
        totalTrades++;
        if (data.win) { synaWins++; totalProfitAccum += (data.pnl || 0); }
        else { synaLosses++; totalProfitAccum -= Math.abs(data.pnl || 0); }
        synaWinsEl.textContent = synaWins;
        synaLossesEl.textContent = synaLosses;
        const total = synaWins + synaLosses;
        synaWinRateEl.textContent = total ? ((synaWins / total) * 100).toFixed(1) + '%' : '0%';
        refreshUI();
        const tradeItem = document.createElement('div');
        tradeItem.className = 'trade-item';
        tradeItem.innerHTML = `<span>SYNA ${selectedMarketPair} - K${SYNA_AMOUNT}</span><span class="${data.win ? 'buy' : 'sell'}">${direction} ${data.win ? 'WIN' : 'LOSS'}</span>`;
        recentTradesList.prepend(tradeItem);
        if (recentTradesList.querySelector('.no-trades')) recentTradesList.querySelector('.no-trades').remove();
        if (recentTradesList.children.length > 10) recentTradesList.lastChild.remove();
    } catch (e) {
        serverAwake = false;
        synaServerMsg.style.display = 'block';
    }
}

function startSyna() {
    if (!binanceSymbolMap[selectedMarketPair] && !forexApiMap[selectedMarketPair]) {
        alert('SYNA requires a supported market (BTC, ETH, XRP, EUR/USD, GBP/USD, XAU/USD).');
        return;
    }
    if (balance < SYNA_AMOUNT) {
        alert('Minimum K100 balance required to start SYNA. Please deposit first.');
        return;
    }
    synaActive = true;
    synaToggleBtn.textContent = 'Stop SYNA';
    synaToggleBtn.style.background = '#FF3D00';
    // Warm up server before starting trades
    wakeServerNow().then(() => {
        updateSynaSignal().then(() => synaTick());
        synaTimer = setInterval(synaTick, 5000);
    });
}
function stopSyna() {
    synaActive = false;
    synaToggleBtn.textContent = 'Start SYNA';
    synaToggleBtn.style.background = '#6C5CE7';
    if (synaTimer) { clearInterval(synaTimer); synaTimer = null; }
    synaServerMsg.style.display = 'none';
}
function toggleSyna() { synaActive ? stopSyna() : startSyna(); }

// ==================== MANUAL TRADE ====================
async function executeTrade() {
    if (!token) return alert('Please log in.');
    tradeError.style.display = 'none';
    const amount = parseFloat(document.getElementById('tradeAmountInput').value);
    if (isNaN(amount) || amount < 200) {
        tradeError.textContent = 'Minimum trade amount is K200.';
        tradeError.style.display = 'block';
        return;
    }
    const max = premium ? 2000 : 500;
    if (amount > max) {
        tradeError.textContent = `Maximum trade for your plan is K${max}.`;
        tradeError.style.display = 'block';
        return;
    }
    if (balance < amount) {
        tradeError.textContent = 'Insufficient balance.';
        tradeError.style.display = 'block';
        return;
    }

    const btn = document.getElementById('executeTradeBtn');
    btn.disabled = true;
    btn.textContent = 'Warming up...';

    // Ensure server is awake and database is warm
    if (!serverAwake) {
        const woke = await wakeServerNow();
        if (!woke) {
            tradeError.textContent = 'Server did not wake. Please try again.';
            tradeError.style.display = 'block';
            btn.disabled = false;
            btn.textContent = 'Execute Trade';
            return;
        }
    } else {
        // Even if server seems awake, do a quick warm-up query
        try { await apiCall('GET', '/api/wallet/balance'); } catch (e) {}
    }

    btn.textContent = 'Executing...';
    const symbol = selectedMarketPair.replace('/', '').replace(' ', '');
    try {
        const data = await apiCall('POST', '/api/trades/manual', {
            symbol: symbol,
            direction: tradeDirection.toUpperCase(),
            amount: amount
        });
        balance = data.new_balance;
        totalTrades++;
        if (data.win) totalProfitAccum += (data.pnl || 0);
        else totalProfitAccum -= Math.abs(data.pnl || 0);
        refreshUI();
        const tradeItem = document.createElement('div');
        tradeItem.className = 'trade-item';
        tradeItem.innerHTML = `<span>${selectedMarketPair} - K${amount}</span><span class="${data.win ? 'buy' : 'sell'}">${tradeDirection.toUpperCase()} ${data.win ? 'WIN' : 'LOSS'}</span>`;
        recentTradesList.prepend(tradeItem);
        if (recentTradesList.querySelector('.no-trades')) recentTradesList.querySelector('.no-trades').remove();
        if (recentTradesList.children.length > 10) recentTradesList.lastChild.remove();
        tradeError.style.display = 'none';
    } catch (err) {
        tradeError.textContent = 'Error: ' + (err.message || 'Trade failed');
        tradeError.style.display = 'block';
    } finally {
        btn.disabled = false;
        btn.textContent = 'Execute Trade';
    }
}

// (refreshUI, login, register, logout, wallet functions etc. remain exactly the same as before)

// Refresh UI function (unchanged)
function refreshUI() {
    balValue.textContent = 'ZMW ' + balance.toLocaleString(undefined, {minimumFractionDigits:2});
    walletBalance.textContent = 'ZMW ' + balance.toLocaleString(undefined, {minimumFractionDigits:2});
    totalProfit.textContent = (totalProfitAccum >= 0 ? '+K' : '-K') + Math.abs(totalProfitAccum).toFixed(2);
    todayProfit.textContent = '+K' + (Math.random() * 200).toFixed(2);
    tradeCount.textContent = totalTrades;
    const fee = premium ? '0.2%' : '0.3%';
    const max = premium ? '2,000' : '500';
    tradeFeeDisplay.textContent = `Fee: ${fee} | Max K${max} (${premium ? 'Pro' : 'Free'})`;
    withdrawFee.textContent = premium ? '0.8%' : '1%';
    if (user) {
        profileName.textContent = user.email ? user.email.split('@')[0] : 'Trader';
        profileEmail.textContent = user.email || '';
        profilePic.textContent = (user.email ? user.email[0] : 'T').toUpperCase();
    }
}

// Auth functions (unchanged)
async function handleLogin() {
    loginError.textContent = '';
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!email || !password) { loginError.textContent = 'Email and password required'; return; }
    try {
        const data = await apiCall('POST', '/api/auth/login', { email, password });
        token = data.token;
        user = data.user;
        balance = parseFloat(user.balance) || 0;
        premium = user.is_premium || false;
        trial = (user.trial_active) || false;
        localStorage.setItem('nrxtrader_token', token);
        localStorage.setItem('nrxtrader_user', JSON.stringify(user));
        loginOverlay.style.display = 'none';
        dashboardContainer.style.display = 'flex';
        refreshUI();
        loadChart(selectedMarketPair);
        checkServer();
        updateSynaSignal();
    } catch (e) { loginError.textContent = e.message; }
}
async function handleRegister() {
    loginError.textContent = '';
    const email = document.getElementById('loginEmail').value.trim();
    const phone = document.getElementById('loginPhone').value.trim();
    const password = document.getElementById('loginPassword').value.trim();
    if (!email || !password) { loginError.textContent = 'Email and password required'; return; }
    try {
        await apiCall('POST', '/api/auth/register', { email, password, phone: phone || undefined });
        loginError.textContent = 'Account created! You can now log in.';
        loginError.style.color = '#00C853';
    } catch (e) { loginError.textContent = e.message; }
}
function logout() {
    token = null; user = null;
    stopSyna();
    if (tvWidget) tvWidget.remove();
    localStorage.clear();
    balance = 0; premium = false; trial = false; totalTrades = 0; totalProfitAccum = 0;
    loginOverlay.style.display = 'flex';
    dashboardContainer.style.display = 'none';
    document.getElementById('loginEmail').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginPhone').value = '';
    recentTradesList.innerHTML = '<div class="no-trades">No trades yet</div>';
    closeSettings(); closeWallet(); closeMarkets(); closeSignals();
    profileDropdown.classList.remove('show');
}

</script>
