<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>NRXTRADER – SYNA Signals</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui; background: #0a0e17; color: #e2e8f0; padding: 16px; }
        .card { background: #111827; border: 1px solid #1f2937; border-radius: 16px; padding: 20px; margin-bottom: 20px; }
        button { background: #3b82f6; color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; cursor: pointer; }
        input { background: #0a0e17; border: 1px solid #1f2937; padding: 10px; border-radius: 8px; color: white; width: 100%; margin-bottom: 12px; }
        .assets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px,1fr)); gap: 10px; margin: 16px 0; }
        .asset-checkbox { display: flex; align-items: center; gap: 8px; background: #0a0e17; padding: 8px; border-radius: 8px; }
        .flex { display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
<div id="auth" class="card" style="max-width:400px; margin:0 auto;">
    <h2>NRXTRADER · SYNA Signals</h2>
    <p>High-confidence trading signals via WhatsApp</p>
    <input type="email" id="email" placeholder="Email">
    <input type="text" id="phone" placeholder="WhatsApp number (e.g., 0977123456)">
    <input type="password" id="password" placeholder="Password">
    <div id="error" style="color:#ef4444; margin-bottom:10px;"></div>
    <button id="loginBtn" style="width:100%; margin-bottom:8px;">Log In</button>
    <button id="registerBtn" style="width:100%; background:transparent; border:1px solid #3b82f6;">Create Account</button>
</div>

<div id="dashboard" style="display:none;">
    <div class="flex"><h2>📡 SYNA Dashboard</h2><button id="logoutBtn">Logout</button></div>
    <div class="card"><p>✅ Logged in as: <span id="userEmail"></span></p><p>📱 WhatsApp: <span id="userPhone"></span></p></div>
    <div class="card"><h3>Select Assets</h3><div id="assetsGrid" class="assets-grid"></div><button id="saveAssetsBtn">Save Selection</button></div>
    <div class="card"><button id="genSignalBtn">🚀 Generate Test Signal (XAUUSD)</button><div id="signalResult" style="margin-top:10px;"></div></div>
    <div class="card"><h3>Admin Panel</h3><p>Open: <a href="#" id="adminLink" target="_blank">https://nrxtrader-api.onrender.com/admin?secret=YOUR_SECRET</a></p></div>
</div>

<script>
const API = 'https://nrxtrader-api.onrender.com';
let token = localStorage.getItem('token');
let userId = null;

async function apiCall(method, path, body = null) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(API + path, { method, headers, body: body ? JSON.stringify(body) : null });
    if (!res.ok) throw new Error((await res.json()).error || 'Request failed');
    return res.json();
}

async function loadDashboard() {
    if (!token) return;
    const user = JSON.parse(localStorage.getItem('user') || '{}');
    document.getElementById('userEmail').innerText = user.email;
    document.getElementById('userPhone').innerText = user.phone;
    // load assets
    try {
        const assetsRes = await apiCall('GET', '/api/user/assets');
        renderAssets(assetsRes.assets);
    } catch(e) { renderAssets([]); }
}

function renderAssets(selected = []) {
    const list = ['XAUUSD','US30','NAS100','EURUSD','GBPUSD','BTCUSD'];
    const grid = document.getElementById('assetsGrid');
    grid.innerHTML = '';
    list.forEach(asset => {
        const checked = selected.includes(asset);
        grid.innerHTML += `<label class="asset-checkbox"><input type="checkbox" value="${asset}" ${checked ? 'checked' : ''}> ${asset}</label>`;
    });
}

async function saveAssets() {
    const checkboxes = document.querySelectorAll('#assetsGrid input');
    const assets = Array.from(checkboxes).filter(cb => cb.checked).map(cb => cb.value);
    try {
        await apiCall('POST', '/api/user/assets', { assets });
        alert('Assets saved!');
    } catch(e) { alert('Error: ' + e.message); }
}

async function generateSignal() {
    try {
        const res = await apiCall('POST', '/api/trades/generate-signal', { assetSymbol: 'XAUUSD' });
        if (res.success) alert('Signal generated! Check admin panel.');
        else alert('Failed: ' + (res.error || 'Unknown'));
    } catch(e) { alert('Error: ' + e.message); }
}

// Auth
document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const phone = document.getElementById('phone').value.trim();
    if (!email || !password) { document.getElementById('error').innerText = 'Email and password required'; return; }
    try {
        const data = await apiCall('POST', '/api/auth/login', { email, password });
        token = data.token;
        localStorage.setItem('token', token);
        localStorage.setItem('user', JSON.stringify(data.user));
        document.getElementById('auth').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        loadDashboard();
    } catch(e) { document.getElementById('error').innerText = e.message; }
};

document.getElementById('registerBtn').onclick = async () => {
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const password = document.getElementById('password').value;
    if (!email || !password) { document.getElementById('error').innerText = 'Email and password required'; return; }
    try {
        await apiCall('POST', '/api/auth/register', { email, phone, password });
        document.getElementById('error').innerText = 'Account created! Please log in.';
        document.getElementById('error').style.color = '#10b981';
    } catch(e) { document.getElementById('error').innerText = e.message; }
};

document.getElementById('logoutBtn').onclick = () => {
    localStorage.clear();
    location.reload();
};

document.getElementById('saveAssetsBtn').onclick = saveAssets;
document.getElementById('genSignalBtn').onclick = generateSignal;

// Admin link
const adminSecret = 'A8dF8d9B2cE5fG1hJ3kL6zX7cV9bN4mQ';
document.getElementById('adminLink').href = `https://nrxtrader-api.onrender.com/admin?secret=${adminSecret}`;

if (token) {
    document.getElementById('auth').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';
    loadDashboard();
}
</script>
</body>
</html>
