async function apiCall(method, path, body) {
    const headers = { 'Content-Type': 'application/json' };
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 60000);
    try {
        const res = await fetch(API + path, {
            method,
            headers,
            body: body ? JSON.stringify(body) : null,
            signal: controller.signal
        });
        clearTimeout(timeout);
        if (!res.ok) {
            const data = await res.json().catch(() => ({}));
            throw new Error(data.error || 'Request failed');
        }
        return await res.json();
    } catch (err) {
        clearTimeout(timeout);
        throw err;
    }
}

// SYNA tick with fallback
async function synaTick() {
    if (!synaActive) return;
    if (balance < SYNA_AMOUNT) {
        stopSyna();
        alert('SYNA stopped: insufficient balance.');
        return;
    }
    if (!serverAwake) {
        synaServerMsg.style.display = 'block';
        const woke = await wakeServerNow();
        if (!woke) return;
    }
    synaServerMsg.style.display = 'none';
    const signalData = await updateSynaSignal();
    if (!signalData.direction || signalData.direction === 'HOLD') return;

    const direction = signalData.direction;
    const symbol = selectedMarketPair.replace('/', '').replace(' ', '');
    const isForex = !!forexApiMap[selectedMarketPair];
    const movePercent = isForex ? 0.005 : 0.03;

    let success = false;
    try {
        const data = await apiCall('POST', '/api/trades/manual', {
            symbol: symbol,
            direction: direction,
            amount: SYNA_AMOUNT
        });
        balance = data.new_balance;
        totalTrades++;
        if (data.win) { synaWins++; totalProfitAccum += (data.pnl || 0); }
        else { synaLosses++; totalProfitAccum -= Math.abs(data.pnl || 0); }
        success = true;
        addTradeLog(`SYNA ${selectedMarketPair} - K${SYNA_AMOUNT}`, direction, data.win);
    } catch (e) {
        console.error('SYNA API failed:', e);
        // Fallback: simulate locally so SYNA keeps running
        const win = Math.random() < 0.8; // base win rate
        const rawGross = SYNA_AMOUNT * movePercent;
        const fee = SYNA_AMOUNT * (premium ? 0.002 : 0.003);
        const net = win ? rawGross - fee : -rawGross - fee;
        balance += net;
        totalTrades++;
        if (win) synaWins++; else synaLosses++;
        totalProfitAccum += net;
        addTradeLog(`SYNA ${selectedMarketPair} (local) - K${SYNA_AMOUNT}`, direction, win);
    }
    synaWinsEl.textContent = synaWins;
    synaLossesEl.textContent = synaLosses;
    const total = synaWins + synaLosses;
    synaWinRateEl.textContent = total ? ((synaWins / total) * 100).toFixed(1) + '%' : '0%';
    refreshUI();
}

function addTradeLog(desc, direction, win) {
    const tradeItem = document.createElement('div');
    tradeItem.className = 'trade-item';
    tradeItem.innerHTML = `<span>${desc}</span><span class="${win ? 'buy' : 'sell'}">${direction} ${win ? 'WIN' : 'LOSS'}</span>`;
    recentTradesList.prepend(tradeItem);
    if (recentTradesList.querySelector('.no-trades')) recentTradesList.querySelector('.no-trades').remove();
    if (recentTradesList.children.length > 10) recentTradesList.lastChild.remove();
}
