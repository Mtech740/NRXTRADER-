<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wake NRXTRADER</title>
    <style>
        body { background: #0a0e17; color: #f1f5f9; font-family: Arial; text-align: center; padding: 40px 20px; }
        .status { font-size: 1.5rem; margin: 20px 0; }
        .awake { color: #10b981; }
        .sleeping { color: #f59e0b; }
        button { padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 1rem; }
    </style>
</head>
<body>
    <h2>NRXTRADER Wake‑Up Tool</h2>
    <p>Click the button and wait. The server will be ready within 1–3 minutes.</p>
    <div class="status sleeping" id="status">Server is asleep</div>
    <button onclick="wakeUp()">Wake Server Now</button>

    <script>
        const API = 'https://nrxtrader-api.onrender.com';

        async function ping() {
            try {
                await fetch(API);  // simple GET to root – any response means awake
                return true;
            } catch (e) {
                return false;
            }
        }

        async function wakeUp() {
            const status = document.getElementById('status');
            status.textContent = 'Waking...';
            status.className = 'status sleeping';
            for (let i = 1; i <= 120; i++) {
                const ok = await ping();
                if (ok) {
                    status.textContent = 'Server is now awake! You may close this tab.';
                    status.className = 'status awake';
                    return;
                }
                status.textContent = `Waking... (attempt ${i}, ${i * 3}s)`;
                await new Promise(r => setTimeout(r, 3000));
            }
            status.textContent = 'Could not wake server. Try again in a few minutes.';
            status.className = 'status sleeping';
        }

        // Auto‑start after 1 second
        setTimeout(wakeUp, 1000);
    </script>
</body>
</html>
