name: Keep Render Backend Alive

on:
  schedule:
    - cron: '*/5 * * * *'   # runs every 5 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping NRXTRADER API
        run: |
          curl -s -o /dev/null -w "%{http_code}" https://nrxtrader-api.onrender.com/api/wallet/balance || true
